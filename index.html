<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Stats Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eaeaea;--text-dim:#a0a0b0;--win:#4caf50;--loss:#f44336}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .header{background:linear-gradient(135deg,var(--surface),var(--accent2));padding:2rem;text-align:center;border-bottom:3px solid var(--accent)}
        .header h1{font-size:2.5rem;margin-bottom:.5rem}.header p{color:var(--text-dim);font-size:1.1rem}
        nav{background:var(--surface);padding:1rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.1)}
        nav button{background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,.1);padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s}
        nav button:hover{background:var(--accent2)}nav button.active{background:var(--accent);border-color:var(--accent)}
        .container{max-width:1400px;margin:0 auto;padding:2rem}.view{display:none}.view.active{display:block}
        .grid{display:grid;gap:1.5rem}.grid-2{grid-template-columns:repeat(auto-fit,minmax(400px,1fr))}.grid-3{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.grid-4{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
        .card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid rgba(255,255,255,.05)}
        .card h3{margin-bottom:1rem;color:var(--accent);font-size:1.1rem}
        .stat-big{font-size:2.5rem;font-weight:bold}.stat-label{color:var(--text-dim);font-size:.85rem;margin-top:.3rem}
        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}.stat-row:last-child{border-bottom:none}
        .badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.8rem;font-weight:bold}
        .badge-win{background:rgba(76,175,80,.2);color:var(--win)}.badge-loss{background:rgba(244,67,54,.2);color:var(--loss)}.badge-neutral{background:rgba(255,255,255,.1);color:var(--text-dim)}
        .wr-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:4px}.wr-bar-fill{height:100%;border-radius:4px;transition:width .5s}
        table{width:100%;border-collapse:collapse}th,td{padding:.7rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}th{color:var(--accent);font-size:.85rem;text-transform:uppercase}
        .chart-container{position:relative;height:300px}
        .player-selector{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .player-btn{padding:.5rem 1rem;border-radius:8px;border:2px solid rgba(255,255,255,.2);background:transparent;color:var(--text);cursor:pointer;font-size:.9rem;transition:all .2s}
        .player-btn:hover{border-color:var(--accent)}.player-btn.active{background:var(--accent);border-color:var(--accent)}
        .deck-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
        .deck-card{cursor:pointer;transition:transform .2s,box-shadow .2s}.deck-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
        .tl{display:inline-block;width:18px;height:18px;margin:1px;border-radius:3px;font-size:9px;text-align:center;line-height:18px;font-weight:bold}
        .tl-W{background:var(--win);color:#fff}.tl-L{background:var(--loss);color:#fff}
        .fun-fact{padding:1rem;background:rgba(233,69,96,.1);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;margin-bottom:1rem;font-size:.95rem}
        .h2h-table td,.h2h-table th{text-align:center;padding:.6rem}.h2h-table td.self{background:rgba(255,255,255,.03)}
        @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.header h1{font-size:1.8rem}nav{gap:.3rem}nav button{padding:.4rem .8rem;font-size:.8rem}}
    </style>
</head>

function processData(){
    const players={},decks={},sessions={};
    RAW_GAMES.forEach((game,idx)=>{
        const date=game.date;
        if(!sessions[date])sessions[date]=[];
        sessions[date].push(game);
        game.players.forEach(p=>{
            if(!players[p.name])players[p.name]={games:[],wins:0,decks:{},sessions:{}};
            const pg=players[p.name];
            const won=game.winner===p.name;
            const wentFirst=game.firstPlayer===p.name;
            pg.games.push({date,deck:p.deck,won,wentFirst,numPlayers:game.players.length,idx});
            if(won)pg.wins++;
            if(!pg.decks[p.deck])pg.decks[p.deck]={wins:0,games:0,results:[],dates:[]};
            pg.decks[p.deck].games++;pg.decks[p.deck].dates.push(date);
            pg.decks[p.deck].results.push(won?'W':'L');
            if(won)pg.decks[p.deck].wins++;
            if(!pg.sessions[date])pg.sessions[date]=[];
            pg.sessions[date].push({won,deck:p.deck});
        });
    });
    return{players,sessions};
}

function renderPD(name){

    Object.entries(p.decks).sort((a,b)=>b[1].games-a[1].games).forEach(([dk,s])=>{
        const dwr=(100*s.wins/s.games).toFixed(0);
        const tl=s.results.map(r=>`<span class="tl tl-${r}">${r}</span>`).join('');
        let trend='➡️';
        if(s.games>=4){const m=Math.floor(s.games/2);const f=s.results.slice(0,m).filter(r=>r==='W').length/m;const sh=s.results.slice(m).filter(r=>r==='W').length/(s.games-m);if(sh-f>.1)trend='📈';else if(f-sh>.1)trend='📉';}
        h+=`<tr><td><strong>${dk}</strong></td><td>${s.games}</td><td>${s.wins}</td><td><span class="badge ${dwr>=30?'badge-win':'badge-loss'}">${dwr}%</span></td><td>${tl}</td><td>${trend}</td></tr>`;

function renderDecks(){
    const el=document.getElementById('view-decks');
    // Collect all decks across all players
    const allDecks={};
    Object.entries(DATA.players).forEach(([pn,pd])=>{
        Object.entries(pd.decks).forEach(([dk,s])=>{
            if(!allDecks[dk])allDecks[dk]={totalGames:0,totalWins:0,players:{}};
            allDecks[dk].totalGames+=s.games;allDecks[dk].totalWins+=s.wins;
            allDecks[dk].players[pn]={wins:s.wins,games:s.games,results:s.results,dates:s.dates};
        });
    });
    // Sort by total games
    const sorted=Object.entries(allDecks).sort((a,b)=>b[1].totalGames-a[1].totalGames);
    
    let h='<div class="player-selector" id="dsel"></div><div id="ddetail"></div>';
    el.innerHTML=h;
    const sel=document.getElementById('dsel');
    // Top decks as buttons
    sorted.slice(0,20).forEach(([dk],i)=>{
        const btn=document.createElement('button');btn.className='player-btn'+(i===0?' active':'');
        btn.textContent=dk;
        btn.onclick=()=>{document.querySelectorAll('#dsel .player-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderDD(dk,allDecks[dk]);};
        sel.appendChild(btn);
    });
    renderDD(sorted[0][0],sorted[0][1]);
}

function renderDD(name,deck){
    const el=document.getElementById('ddetail');
    const wr=(100*deck.totalWins/deck.totalGames).toFixed(1);
    const players=Object.entries(deck.players).sort((a,b)=>b[1].games-a[1].games);
    
    let h=`<div class="card" style="margin-bottom:1.5rem;border-left:4px solid var(--accent)"><div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap">`;
    h+=`<div><div class="stat-big" style="color:var(--accent)">${name}</div><div class="stat-label">Deck</div></div>`;
    h+=`<div><div class="stat-big">${deck.totalGames}</div><div class="stat-label">Gier łącznie</div></div>`;
    h+=`<div><div class="stat-big">${wr}%</div><div class="stat-label">Ogólny WR</div></div>`;
    h+=`<div><div class="stat-big">${players.length}</div><div class="stat-label">Graczy</div></div>`;
    h+='</div></div>';
    
    h+='<div class="grid grid-2">';
    h+=`<div class="card"><h3>👤 Gracze używający ${name}</h3>`;
    h+='<table><tr><th>Gracz</th><th>Gry</th><th>W</th><th>WR</th><th>Timeline</th><th>Trend</th></tr>';
    players.forEach(([pn,s])=>{
        const pwr=(100*s.wins/s.games).toFixed(0);
        const tl=s.results.map(r=>`<span class="tl tl-${r}">${r}</span>`).join('');
        let trend='➡️';
        if(s.games>=4){const m=Math.floor(s.games/2);const f=s.results.slice(0,m).filter(r=>r==='W').length/m;const sh=s.results.slice(m).filter(r=>r==='W').length/(s.games-m);if(sh-f>.1)trend='📈';else if(f-sh>.1)trend='📉';}
        h+=`<tr><td><span style="color:${PLAYER_COLORS[pn]||'#666'}">●</span> <strong>${pn}</strong></td><td>${s.games}</td><td>${s.wins}</td><td><span class="badge ${pwr>=30?'badge-win':'badge-loss'}">${pwr}%</span></td><td>${tl}</td><td>${trend}</td></tr>`;
    });
    h+='</table></div>';
    
    h+=`<div class="card"><h3>📈 Progresja w czasie</h3><div class="chart-container"><canvas id="ch-dk-prog"></canvas></div></div>`;
    h+='</div>';
    
    // Stats cards
    h+='<div class="grid grid-3" style="margin-top:1.5rem">';
    players.forEach(([pn,s])=>{
        if(s.games<2)return;
        const pwr=(100*s.wins/s.games).toFixed(0);
        const maxW=s.results.join('').split('L').reduce((m,r)=>Math.max(m,r.length),0);
        const maxL=s.results.join('').split('W').reduce((m,r)=>Math.max(m,r.length),0);
        const first=s.dates[0];const last=s.dates[s.dates.length-1];
        h+=`<div class="card"><h3 style="color:${PLAYER_COLORS[pn]||'#666'}">${pn}</h3>`;
        h+=`<div class="stat-row"><span>Winrate</span><span class="badge ${pwr>=30?'badge-win':'badge-loss'}">${pwr}%</span></div>`;
        h+=`<div class="stat-row"><span>Gry</span><span>${s.games}</span></div>`;
        h+=`<div class="stat-row"><span>Max Win Streak</span><span>${maxW}</span></div>`;
        h+=`<div class="stat-row"><span>Max Loss Streak</span><span>${maxL}</span></div>`;
        h+=`<div class="stat-row"><span>Okres</span><span style="font-size:.8rem">${first.slice(0,7)} → ${last.slice(0,7)}</span></div>`;
        h+='</div>';
    });
    h+='</div>';
    
    el.innerHTML=h;
    
    // Chart
    if(document.getElementById('ch-dk-prog')){
        const ctx=document.getElementById('ch-dk-prog').getContext('2d');
        const datasets=players.filter(([,s])=>s.games>=2).map(([pn,s])=>{
            let cw=0,cg=0;const pts=[];
            s.dates.forEach((d,i)=>{cg++;if(s.results[i]==='W')cw++;pts.push({x:d.slice(5),y:+(100*cw/cg).toFixed(1)});});
            return{label:pn,data:pts.map(p=>p.y),borderColor:PLAYER_COLORS[pn]||'#666',tension:.3,pointRadius:3,fill:false};
        });
        const maxLabels=Math.max(...datasets.map(d=>d.data.length));
        const lbls=players.reduce((best,cur)=>cur[1].games>best[1].games?cur:best)[1].dates.map(d=>d.slice(5));
        new Chart(ctx,{type:'line',data:{labels:lbls,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eaeaea'}}},scales:{x:{ticks:{color:'#a0a0b0',maxRotation:45}},y:{min:0,ticks:{color:'#a0a0b0',callback:v=>v+'%'}}}}});
    }
}

function renderH2H(){
    const el=document.getElementById('view-h2h');
    const h2h={};
    RAW_GAMES.forEach(g=>{
        g.players.forEach(p1=>{
            g.players.forEach(p2=>{
                if(p1.name!==p2.name){
                    const k=p1.name+'|'+p2.name;
                    if(!h2h[k])h2h[k]={games:0,wins:0};
                    h2h[k].games++;
                    if(g.winner===p1.name)h2h[k].wins++;
                }
            });
        });
    });
    let h='<div class="card"><h3>🆚 Head-to-Head Matrix</h3><p style="color:var(--text-dim);margin-bottom:1rem">Winrate gracza (wiersz) w grach z przeciwnikiem (kolumna)</p>';
    h+='<div style="overflow-x:auto"><table class="h2h-table"><tr><th></th>';
    ALL_PLAYERS.forEach(p=>{h+=`<th style="color:${PLAYER_COLORS[p]||'#666'}">${p}</th>`;});
    h+='</tr>';
    ALL_PLAYERS.forEach(p1=>{
        h+=`<tr><td><strong style="color:${PLAYER_COLORS[p1]||'#666'}">${p1}</strong></td>`;
        ALL_PLAYERS.forEach(p2=>{
            if(p1===p2){h+='<td class="self">—</td>';}
            else{
                const k=p1+'|'+p2;const d=h2h[k];
                if(d&&d.games>0){
                    const wr=(100*d.wins/d.games).toFixed(0);
                    const bg=wr>=40?'rgba(76,175,80,.2)':wr>=25?'rgba(255,255,255,.05)':'rgba(244,67,54,.2)';
                    h+=`<td style="background:${bg}"><strong>${wr}%</strong><br><span style="font-size:.7rem;color:var(--text-dim)">${d.wins}/${d.games}</span></td>`;
                }else h+='<td>—</td>';
            }
        });
        h+='</tr>';
    });
    h+='</table></div></div>';
    
    // Rivalries
    h+='<div class="card" style="margin-top:1.5rem"><h3>🔥 Najciekawsze rywalizacje</h3>';
    const rivalries=[];
    ALL_PLAYERS.forEach(p1=>{ALL_PLAYERS.forEach(p2=>{
        if(p1<p2){
            const k1=p1+'|'+p2,k2=p2+'|'+p1;
            const d1=h2h[k1],d2=h2h[k2];
            if(d1&&d1.games>=10){
                const wr1=(100*d1.wins/d1.games).toFixed(0);
                const wr2=(100*d2.wins/d2.games).toFixed(0);
                const closeness=100-Math.abs(d1.wins-d2.wins)*100/d1.games;
                rivalries.push({p1,p2,games:d1.games,w1:d1.wins,w2:d2.wins,wr1,wr2,closeness});
            }
        }
    });});
    rivalries.sort((a,b)=>b.closeness-a.closeness);
    rivalries.forEach(r=>{
        const bar1=Math.round(100*r.w1/(r.w1+r.w2));
        h+=`<div style="margin-bottom:1rem"><div style="display:flex;justify-content:space-between;margin-bottom:.3rem"><span style="color:${PLAYER_COLORS[r.p1]}">${r.p1} (${r.wr1}%)</span><span style="color:var(--text-dim)">${r.games} gier</span><span style="color:${PLAYER_COLORS[r.p2]}">${r.p2} (${r.wr2}%)</span></div>`;
        h+=`<div style="height:12px;background:${PLAYER_COLORS[r.p2]||'#666'};border-radius:6px;overflow:hidden"><div style="height:100%;width:${bar1}%;background:${PLAYER_COLORS[r.p1]||'#666'}"></div></div></div>`;
    });
    h+='</div>';
    
    // Dominance chart
    h+='<div class="card" style="margin-top:1.5rem"><h3>📊 Dominacja (WR vs każdy przeciwnik)</h3><div class="chart-container" style="height:350px"><canvas id="ch-h2h-dom"></canvas></div></div>';
    el.innerHTML=h;
    
    // Chart
    const ctx=document.getElementById('ch-h2h-dom').getContext('2d');
    const datasets=MAIN_PLAYERS.map(p1=>{
        return{label:p1,data:MAIN_PLAYERS.map(p2=>{if(p1===p2)return null;const k=p1+'|'+p2;return h2h[k]?+(100*h2h[k].wins/h2h[k].games).toFixed(1):null;}),backgroundColor:PLAYER_COLORS[p1]+'88',borderColor:PLAYER_COLORS[p1],borderWidth:1};
    });
    new Chart(ctx,{type:'bar',data:{labels:MAIN_PLAYERS.map(p=>'vs '+p),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eaeaea'}}},scales:{x:{ticks:{color:'#a0a0b0'}},y:{ticks:{color:'#a0a0b0',callback:v=>v+'%'}}}}});
}

    // First player stats overall

    facts.push(`🎯 <strong>First Player Advantage:</strong> ${(100*fpWins/RAW_GAMES.length).toFixed(0)}% gier wygrywa gracz który zaczynał (${fpWins}/${RAW_GAMES.length})`);

// === DECK POWER RATING ===
// Wilson Score Lower Bound (95% confidence)
function wilsonScore(wins, games) {
    if (games === 0) return 0;
    const z = 1.96; // 95% CI
    const p = wins / games;
    const denom = 1 + z*z/games;
    const center = p + z*z/(2*games);
    const spread = z * Math.sqrt((p*(1-p) + z*z/(4*games)) / games);
    return Math.max(0, (center - spread) / denom);
}

// Bayesian Average (with prior of global average + C virtual games)
function bayesianAvg(wins, games, globalWr, C) {
    return (wins + C * globalWr) / (games + C);
}

// Combined Power Score: Wilson * log2(games+1) bonus for volume
function powerScore(wins, games) {
    const wilson = wilsonScore(wins, games);
    const volumeBonus = Math.log2(games + 1) / Math.log2(30); // normalized to ~30 games
    return wilson * (0.7 + 0.3 * Math.min(1, volumeBonus)); // 70% wilson, 30% volume
}

function renderPowerRating() {
    // Collect all player-deck combos
    const allDecks = [];
    const globalWins = Object.values(DATA.players).reduce((s,p)=>s+p.wins, 0);
    const globalGames = RAW_GAMES.length * RAW_GAMES[0].players.length / RAW_GAMES.length; // avg players
    const avgPlayersPerGame = RAW_GAMES.reduce((s,g)=>s+g.players.length,0) / RAW_GAMES.length;
    const globalWr = globalWins / (RAW_GAMES.length * avgPlayersPerGame); // ~expected
    const C = 5; // virtual games for Bayesian
    
    Object.entries(DATA.players).forEach(([player, pd]) => {
        Object.entries(pd.decks).forEach(([deck, stats]) => {
            if (stats.games >= 2) {
                const wilson = wilsonScore(stats.wins, stats.games);
                const bayes = bayesianAvg(stats.wins, stats.games, 0.28, C);
                const power = powerScore(stats.wins, stats.games);
                allDecks.push({
                    player, deck, 
                    games: stats.games, wins: stats.wins,
                    rawWr: stats.wins/stats.games,
                    wilson, bayes, power,
                    results: stats.results
                });
            }
        });
    });
    
    allDecks.sort((a,b) => b.power - a.power);

    allDecks.forEach((d, i) => {

        const playerCol = PLAYER_COLORS[d.player] || '#666';
        const highlight = i < 3 ? 'style="background:rgba(255,215,0,.05)"' : i < 10 ? 'style="background:rgba(76,175,80,.02)"' : '';
        h += `<tr ${highlight}><td>${i+1}</td><td><span style="color:${playerCol}">●</span> ${d.player}</td><td><strong>${d.deck}</strong></td><td>${d.games}</td>`;

        h += `<td><span class="badge ${d.power>=0.25?'badge-win':'badge-loss'}">${powerPct}</span></td>`;

    // Insight: biggest diff between raw WR and Wilson
    h += '<div class="card" style="margin-top:1.5rem"><h3>🔍 Biggest "Illusions" — decki które wyglądają lepiej niż są</h3>';

    const illusions = allDecks.filter(d=>d.games>=2).map(d=>({...d, gap: d.rawWr - d.wilson})).sort((a,b)=>b.gap-a.gap).slice(0,8);

    });
    h += '</div>';
    
    return {html: h, topDecks: allDecks.slice(0, 20)};
}

    corrData.forEach(([name,r,dir,interp]) => {
        const col = r<-0.2?'badge-win':r>0.2?'badge-loss':'badge-neutral';
        h += `<tr><td><strong>${name}</strong></td><td><span class="badge ${col}">${r>0?'+':''}${r.toFixed(3)}</span></td><td>${dir}</td><td style="font-size:.85rem;color:var(--text-dim)">${interp}</td></tr>`;
    });
    h += '</table></div></div>';
    
    // Insights
    h += '<div class="card" style="margin-top:1.5rem"><h3>🧠 Wnioski</h3>';
    h += '<div class="fun-fact">📊 <strong>Istnieje słaba negatywna korelacja (r=-0.13)</strong> między kosztem commandera a winrate. Nie jest silna statystycznie, ale trend jest widoczny.</div>';
    h += '<div class="fun-fact">🏆 <strong>Tanie commandery (CMC ≤3) wygrywają 45.5%</strong> vs drogie (CMC 5-6) 25%. Różnica +14.3pp!</div>';
    h += '<div class="fun-fact">🎯 <strong>Killian (CMC 2) ma 86% WR</strong> — najtańszy i najskuteczniejszy commander w całej grupie.</div>';
    h += '<div class="fun-fact">🦖 <strong>Gishath (CMC 8) ma 20% WR na 25 grach</strong> — drogie commandery nie nadrabiają lategame'em.</div>';
    h += '<div class="fun-fact">👤 <strong>Nori ma najsilniejszą korelację (r=-0.42)</strong>: Prosper (CMC 4) = 44% WR, Sauron (CMC 5) = 12%, Gishath (CMC 8) = 19%.</div>';
    h += '<div class="fun-fact">⚖️ <strong>Sweet spot to CMC 2-4.</strong> Za tanie i szybkie na stół, bez ryzyka że nie odpalą. CMC 5+ commandery dają czas przeciwnikom na setup.</div>';
    h += '</div>';
    
    el.innerHTML = h;
    
    // Charts
    const cmcKeys = Object.keys(cmcBuckets).map(Number).sort((a,b)=>a-b);
    new Chart(document.getElementById('ch-cmc-bar').getContext('2d'), {
        type:'bar',
        data:{
            labels:cmcKeys.map(c=>'CMC '+c),
            datasets:[
                {label:'Winrate',data:cmcKeys.map(c=>(100*cmcBuckets[c].wins/cmcBuckets[c].games).toFixed(1)),backgroundColor:cmcKeys.map(c=>c<=3?'#4caf5088':c<=4?'#ff980088':c<=6?'#f4433688':'#9c27b088')},
                {label:'# Gier',data:cmcKeys.map(c=>cmcBuckets[c].games),type:'line',borderColor:'#fff8',yAxisID:'y1',pointRadius:4}
            ]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eaeaea'}}},scales:{x:{ticks:{color:'#a0a0b0'}},y:{max:80,ticks:{color:'#a0a0b0',callback:v=>v+'%'}},y1:{position:'right',ticks:{color:'#a0a0b0'}}}}
    });
    
    // Scatter
    new Chart(document.getElementById('ch-cmc-scatter').getContext('2d'), {
        type:'scatter',
        data:{
            datasets: MAIN_PLAYERS.map(p => ({
                label: p,
                data: scatterData.filter(d=>d.player===p).map(d=>({x:d.x,y:d.y})),
                backgroundColor: PLAYER_COLORS[p]+'aa',
                borderColor: PLAYER_COLORS[p],
                pointRadius: scatterData.filter(d=>d.player===p).map(d=>3+d.games/3),
            }))
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{labels:{color:'#eaeaea'}},tooltip:{callbacks:{label:function(ctx){const d=scatterData.filter(s=>s.player===MAIN_PLAYERS[ctx.datasetIndex]);return d[ctx.dataIndex]?d[ctx.dataIndex].label+' ('+d[ctx.dataIndex].games+' gier)':'';}} } },
            scales:{x:{title:{display:true,text:'CMC',color:'#eaeaea'},ticks:{color:'#a0a0b0'}},y:{title:{display:true,text:'Winrate %',color:'#eaeaea'},max:100,ticks:{color:'#a0a0b0',callback:v=>v+'%'}}}
        }
    });
    
    // Player CMC preference grouped bar
    const buckets = ['2-3','4','5-6','7+'];
    new Chart(document.getElementById('ch-cmc-player').getContext('2d'), {
        type:'bar',
        data:{
            labels: buckets.map(b=>'CMC '+b),
            datasets: MAIN_PLAYERS.map(p => ({
                label: p,
                data: buckets.map(b => {const s=playerCmc[p]?playerCmc[p][b]:null; return s&&s.g>=2?(100*s.w/s.g).toFixed(1):null;}),
                backgroundColor: PLAYER_COLORS[p]+'88',
                borderColor: PLAYER_COLORS[p],
                borderWidth: 1
            }))
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#eaeaea'}}},scales:{x:{ticks:{color:'#a0a0b0'}},y:{max:70,ticks:{color:'#a0a0b0',callback:v=>v+'%'}}}}
    });
}

// Navigation update
function showView(name){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    event.target.classList.add('active');
    const r={overview:renderOverview,players:renderPlayers,decks:renderDecks,h2h:renderH2H,funfacts:renderFunFacts,colors:renderColors,power:renderPower,cmc:renderCMC};
    if(!window['_'+name+'Done']){r[name]();window['_'+name+'Done']=true;}
}

// Init
renderOverview();

</script>
</body>
</html>
